# Salva questo file in: .github/workflows/aggiorna_db.yml

name: Aggiorna database Serie A

on:
  schedule:
    - cron: "0 7 * * 3"  # ogni mercoledì alle 7:00 UTC
  workflow_dispatch:       # consente avvio manuale dal sito GitHub

jobs:
  scraping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install requests supabase

      - name: Esegui scraping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: python scraper.py
